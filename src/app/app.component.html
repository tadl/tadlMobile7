<ion-app>
  <!-- LEFT MENU (main navigation) -->
  <ion-menu contentId="main-content" menuId="main" side="start">
    <ion-header>
      <ion-toolbar>
        <ion-title>Main Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages">
          <ion-item [routerLink]="p.url" routerDirection="root" lines="none">
            <ion-icon slot="start" [name]="p.icon"></ion-icon>
            <ion-label>{{ p.title }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- RIGHT MENU (Account) -->
  <ion-menu contentId="main-content" menuId="account" side="end" (ionDidOpen)="accountMenuDidOpen()">
    <ion-header>
      <ion-toolbar>
        <ion-title>Account</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <app-account-menu></app-account-menu>
    </ion-content>
  </ion-menu>

  <!-- Main router outlet -->
  <div class="app-root">
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </div>
</ion-app>
