<ion-app>
  <!-- LEFT MENU (main navigation) -->
  <ion-menu contentId="main-content" menuId="main" side="start">
    <ion-header>
      <ion-toolbar>
        <ion-title>Main Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages">
          <ion-item [routerLink]="p.url" routerDirection="root" lines="none">
            <ion-icon slot="start" [name]="p.icon"></ion-icon>
            <ion-label>{{ p.title }}</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- RIGHT MENU (Account / ILS shell for later) -->
  <ion-menu contentId="main-content" menuId="account" side="end">
    <ion-header>
      <ion-toolbar>
        <ion-title>Account Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <p>
        Account features (login, holds, checkouts, barcode, etc.) will live here once the
        Aspen proxy service is wired up.
      </p>

      <ion-list>
        <ion-item button (click)="globals.toggleMenu('account')">
          <ion-icon name="close" slot="start"></ion-icon>
          <ion-label>Close</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Main router outlet -->
  <div class="app-root">
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </div>
</ion-app>
