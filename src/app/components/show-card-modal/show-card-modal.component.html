<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
    <ion-title>Your Library Card</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="library-card-layout">
    <div class="card-shell">
      <!-- SVG is generated by JsBarcode -->
      <svg id="library-card-barcode"></svg>
    </div>

    <div class="helper-card">
      <p class="helper-copy">
        Use your mobile device as a library card to check out at any library location.
      </p>

      <p class="helper-copy">
        Just scan the above barcode and leave your card in your wallet!
      </p>

      <div *ngIf="melcatId" class="melcat-block">
        <div class="melcat-label">Your MeLCat ID</div>
        <div class="melcat-value">{{ melcatId }}</div>
      </div>
    </div>
  </div>
</ion-content>
