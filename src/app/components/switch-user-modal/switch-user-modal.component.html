<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
    <ion-title>Switch User</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-item *ngIf="storedAccounts.length > 0" lines="none" class="stored-accounts-header">
    <ion-label class="section-title">Stored Accounts</ion-label>
  </ion-item>

  <ion-list *ngIf="storedAccounts.length > 0" lines="full" class="full-list">
    <ion-item button *ngFor="let a of storedAccounts" (click)="tapStoredAccount(a)">
      <ion-label class="ion-text-wrap">
        <div class="acct-title">{{ accountLabel(a) }}</div>
        <ion-note>{{ a.username }}</ion-note>
      </ion-label>

      <ion-badge *ngIf="(auth.authState() | async)?.activeAccountId === a.id" slot="end">
        Active
      </ion-badge>
    </ion-item>
  </ion-list>

  <div class="section-header">
    <div class="section-title">Log in</div>
  </div>

  <div class="login-card">
    <ion-item class="login-item" lines="none">
      <ion-input
        class="login-input"
        [(ngModel)]="username"
        label="Library card / username"
        labelPlacement="floating"
        fill="outline"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="Enter card number or username"
      ></ion-input>
    </ion-item>

    <ion-item class="login-item password-input-wrap" lines="none">
      <ion-input
        class="login-input login-input--password"
        [(ngModel)]="password"
        [type]="showPassword ? 'text' : 'password'"
        label="Password"
        labelPlacement="floating"
        fill="outline"
        [clearOnEdit]="true"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="Enter password"
      ></ion-input>
      <ion-button
        fill="clear"
        size="small"
        class="password-toggle-inline"
        aria-label="Toggle password visibility"
        (click)="togglePasswordVisibility()"
      >
        <ion-icon slot="icon-only" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
      </ion-button>
    </ion-item>
  </div>

  <div class="actions">
    <ion-button expand="block" (click)="submitLogin()">Log In</ion-button>
    <ion-button expand="block" fill="clear" (click)="troubleLoggingIn()">Trouble logging in?</ion-button>
  </div>
</ion-content>
