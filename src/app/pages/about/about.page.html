<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>About</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Traverse Area District Library</ion-card-title>
      <ion-card-subtitle>App v{{ globals.app_version }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <ion-button expand="block" (click)="globals.open_page('https://www.tadl.org')">
        Visit tadl.org
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
