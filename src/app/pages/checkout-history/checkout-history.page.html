<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>Checkout History</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="items.length > 0" lines="full" class="full-list">
    <ion-item button *ngFor="let i of items; trackBy: trackByItem" (click)="openItem(i)">
      <ion-thumbnail slot="start" *ngIf="coverUrl(i)">
        <img [src]="coverUrl(i)" alt="" (error)="$event.target.style.display='none'" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <div class="title">{{ titleText(i) }}</div>
        <div class="sub" *ngIf="authorText(i)">{{ authorText(i) }}</div>
        <ion-note *ngIf="whenText(i)" class="meta">{{ whenText(i) }}</ion-note>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!loading && items.length === 0">
    <ion-label class="ion-text-wrap">
      No checkout history available.
    </ion-label>
  </ion-item>

  <ion-infinite-scroll threshold="100px" [disabled]="infiniteDisabled" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more history...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
