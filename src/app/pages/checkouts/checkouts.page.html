<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>Checkouts</ion-title>

    <ion-buttons slot="end">
      <ion-button
        (click)="confirmRenewAll()"
        [disabled]="loading || renewAllBusy || !hasRenewableCheckouts"
      >
        Renew all
      </ion-button>
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="hasAnyData" lines="full" class="full-list">
    <ion-item
      button
      *ngFor="let c of ilsCheckouts; trackBy: trackByCheckout"
      (click)="openCheckout(c)"
    >
      <ion-thumbnail slot="start" *ngIf="c.coverUrl">
        <img [src]="c.coverUrl" alt="" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <div class="title">{{ checkoutTitle(c) }}</div>
        <div class="sub" *ngIf="checkoutAuthor(c)">{{ checkoutAuthor(c) }}</div>

        <ion-note *ngIf="dueText(c)" class="checkout-meta">
          Due: {{ dueText(c) }}
        </ion-note>
        <ion-note *ngIf="checkoutRenewInfoText(c)" class="checkout-meta">
          {{ checkoutRenewInfoText(c) }}
        </ion-note>

        <ion-note *ngIf="c.overdue" class="overdue">Overdue</ion-note>
      </ion-label>

      <div slot="end" class="checkout-actions" (click)="$event.stopPropagation()">
        <ion-button
          fill="clear"
          size="small"
          [disabled]="renewAllBusy || isRenewing(c)"
          (click)="openCheckoutActions(c, $event)"
          aria-label="Checkout actions"
        >
          <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
        </ion-button>
      </div>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!loading && !hasAnyData">
    <ion-label class="ion-text-wrap">
      No checkouts right now.
    </ion-label>
  </ion-item>
</ion-content>
