<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>Checkouts</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="hasAnyData" lines="full" class="full-list">
    <ion-item
      button
      *ngFor="let c of ilsCheckouts; trackBy: trackByCheckout"
      (click)="openCheckout(c)"
    >
      <ion-thumbnail slot="start" *ngIf="c.coverUrl">
        <img [src]="c.coverUrl" alt="" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <div class="title">{{ checkoutTitle(c) }}</div>
        <div class="sub" *ngIf="checkoutAuthor(c)">{{ checkoutAuthor(c) }}</div>

        <ion-note *ngIf="dueText(c)" class="due">
          Due: {{ dueText(c) }}
        </ion-note>

        <ion-note *ngIf="c.overdue" class="overdue">Overdue</ion-note>
      </ion-label>

      <ion-badge slot="end" color="success" *ngIf="c.canRenew">Renewable</ion-badge>
      <ion-badge slot="end" color="medium" *ngIf="!c.canRenew">No renew</ion-badge>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!loading && !hasAnyData">
    <ion-label class="ion-text-wrap">
      No checkouts right now.
    </ion-label>
  </ion-item>
</ion-content>
