<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>

    <ion-title>Events</ion-title>

    <ion-buttons slot="end">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Filter dropdown at top of list -->
  <ion-toolbar>
    <ion-item lines="none">
      <ion-label>Location</ion-label>
      <ion-select
        interface="popover"
        [value]="selectedVenueCode"
        (ionChange)="onVenueChange($event.detail.value)"
      >
        <ion-select-option *ngFor="let v of venues" [value]="venueValue(v)">
          {{ venueLabel(v) }}
        </ion-select-option>
      </ion-select>
    </ion-item>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher
    slot="fixed"
    (ionRefresh)="onVenueChange(selectedVenueCode); $event.target.complete()"
  >
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="!loading && !error">
    <ion-item
      button
      *ngFor="let ev of events; trackBy: trackByUrl"
      (click)="openEvent(ev)"
      detail="true"
    >
      <ion-thumbnail slot="start">
        <ion-img [src]="imageFor(ev)" [alt]="titleFor(ev)"></ion-img>
      </ion-thumbnail>

      <ion-label>
        <h2>{{ ev.title }}</h2>
        <p>{{ ev.start_date | date: 'EEE, MMM d, y · h:mm a' }}</p>
        <p>{{ ev.location }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <div class="state" *ngIf="!loading && error">
    <p>{{ error }}</p>
    <ion-button expand="block" (click)="onVenueChange(selectedVenueCode)">
      Retry
    </ion-button>
  </div>

  <div class="state" *ngIf="!loading && !error && events.length === 0">
    <p>No events found for this location.</p>
  </div>
</ion-content>
