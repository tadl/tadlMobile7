<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>Events</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="get_events(location); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item button *ngFor="let e of web_events" (click)="view_details(e)">
      <ion-label>
        <h2>{{ e.title }}</h2>
        <p *ngIf="e.start">{{ e.start }}</p>
        <p *ngIf="e.venue_name">{{ e.venue_name }}</p>
      </ion-label>
      <ion-icon name="chevron-forward" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!globals.api_loading && web_events.length === 0">
    <ion-label>No events found.</ion-label>
  </ion-item>

  <ion-spinner *ngIf="globals.api_loading" class="ion-padding"></ion-spinner>
</ion-content>
