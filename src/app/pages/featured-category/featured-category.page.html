<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/featured"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ categoryTitle }}</ion-title>

    <ion-buttons slot="end">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="items.length > 0" lines="full" class="full-list">
    <ion-item button detail="false" *ngFor="let i of items; trackBy: trackByRecord" (click)="openRecord(i)">
      <ion-thumbnail slot="start" *ngIf="coverUrl(i)">
        <img [src]="coverUrl(i)" alt="" (error)="$event.target.style.display='none'" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <h2 class="result-title">
          <ion-icon [name]="mediaIconNameForRecord(i)" aria-hidden="true"></ion-icon>
          <span class="title">{{ titleText(i) }}</span>
        </h2>
        <div class="sub" *ngIf="authorText(i)">{{ authorText(i) }}</div>
      </ion-label>

      <ion-button
        slot="end"
        fill="clear"
        size="small"
        class="row-action"
        aria-label="Featured item actions"
        [disabled]="rowActionBusy(i)"
        (click)="openRecordActions(i, $event)"
      >
        <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!loading && items.length === 0">
    <ion-label class="ion-text-wrap">
      No titles in this category.
    </ion-label>
  </ion-item>

  <ion-infinite-scroll threshold="100px" [disabled]="infiniteDisabled" (ionInfinite)="loadMore($event)">
    <ion-infinite-scroll-content loadingSpinner="bubbles" loadingText="Loading more titles...">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
