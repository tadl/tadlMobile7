<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>

    <ion-title>Featured Items</ion-title>

    <ion-buttons slot="end">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="refresh(selectedTab, $event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-segment [value]="selectedTab" (ionChange)="onTabChanged($event)">
    <ion-segment-button value="books">
      <ion-label>Books</ion-label>
    </ion-segment-button>
    <ion-segment-button value="video">
      <ion-label>Video</ion-label>
    </ion-segment-button>
    <ion-segment-button value="music">
      <ion-label>Music</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="refreshing-note" *ngIf="isTabLoading(selectedTab) && tilesByTab[selectedTab].length > 0">
    Refreshing featured items...
  </div>

  <div class="skeleton-list" *ngIf="isTabLoading(selectedTab) && tilesByTab[selectedTab].length === 0">
    <ion-card class="category-card" *ngFor="let _card of [1, 2, 3, 4]">
      <ion-card-header>
        <ion-card-title>
          <ion-skeleton-text animated style="width: 55%;"></ion-skeleton-text>
        </ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="cover-grid">
          <ion-skeleton-text
            *ngFor="let _cover of [1, 2, 3, 4, 5, 6]"
            animated
            class="cover-skeleton"
            [class.square-cover]="selectedTab === 'music'"
          ></ion-skeleton-text>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

  <ion-list lines="none" *ngIf="tilesByTab[selectedTab].length > 0">
    <ion-item-group *ngFor="let tile of tilesByTab[selectedTab]; trackBy: trackByTile">
      <ion-card class="category-card" button (click)="openCategory(tile)">
        <ion-card-header>
          <ion-card-title>{{ tile.label }}</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <div class="cover-grid" *ngIf="tile.covers.length > 0">
            <img
              *ngFor="let cover of tile.covers"
              [src]="cover"
              [class.square-cover]="selectedTab === 'music'"
              alt=""
              (error)="$event.target.style.visibility='hidden'"
            />
          </div>
          <div class="view-all">View all</div>
        </ion-card-content>
      </ion-card>
    </ion-item-group>
  </ion-list>

  <ion-item *ngIf="!isTabLoading(selectedTab) && tabErrorByTab[selectedTab] && tilesByTab[selectedTab].length === 0">
    <ion-label class="ion-text-wrap">
      {{ tabErrorByTab[selectedTab] }}
      <div class="error-actions">
        <ion-button size="small" fill="outline" (click)="retrySelectedTab()">Retry</ion-button>
      </div>
    </ion-label>
  </ion-item>

  <ion-item *ngIf="!isTabLoading(selectedTab) && !tabErrorByTab[selectedTab] && tilesByTab[selectedTab].length === 0">
    <ion-label class="ion-text-wrap">
      No featured categories are available in this section.
    </ion-label>
  </ion-item>
</ion-content>
