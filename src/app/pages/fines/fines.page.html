<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/account"></ion-back-button>
    </ion-buttons>

    <ion-title>Fines</ion-title>

    <ion-buttons slot="end">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-card class="summary-card">
    <ion-card-header>
      <ion-card-title>Total owed</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div class="total-amount">{{ totalOwedText() }}</div>
      <ion-button *ngIf="canPayFines" expand="block" class="pay-button" (click)="payFines()">
        Pay fines
      </ion-button>
    </ion-card-content>
  </ion-card>

  <ion-card *ngIf="hasAnyData" class="charges-card">
    <ion-card-header>
      <ion-card-title>Charges</ion-card-title>
    </ion-card-header>
    <ion-card-content class="ion-no-padding">
      <ion-list lines="full" class="full-list">
        <ion-item *ngFor="let fine of fines; trackBy: trackByFine">
          <ion-label class="ion-text-wrap">
            <div class="reason">{{ fineReason(fine) }}</div>
            <ion-note *ngIf="fineDateText(fine)" class="meta">{{ fineDateText(fine) }}</ion-note>
            <ion-note *ngIf="fineOriginalAmountText(fine)" class="meta">
              Original amount: {{ fineOriginalAmountText(fine) }}
            </ion-note>
            <ion-note *ngIf="fineMessageText(fine)" class="message">{{ fineMessageText(fine) }}</ion-note>
          </ion-label>

          <div slot="end" class="amount">{{ fineAmountText(fine) }}</div>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-item *ngIf="!loading && !hasAnyData">
    <ion-label class="ion-text-wrap">
      No fines right now.
    </ion-label>
  </ion-item>
</ion-content>
