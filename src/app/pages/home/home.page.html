<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>TADL</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Welcome</ion-card-title>
      <ion-card-subtitle>Home screen (non-ILS)</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      Use the left menu to browse <b>Events</b>, <b>News</b>, <b>Locations</b>, and <b>Featured</b>.
      Account features will reappear on the right menu once the Aspen proxy is ready.
    </ion-card-content>
  </ion-card>

  <!-- Quick Search -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Search the catalog</ion-card-title>
      <ion-card-subtitle>Quick search</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <form action="/search" method="get">
        <ion-searchbar
          name="lookfor"
          placeholder="Search books, movies, music..."
          inputmode="search"
          enterkeyhint="search"
        ></ion-searchbar>

        <div class="ion-margin-top" style="display: flex; gap: 12px; align-items: center;">
          <ion-button type="submit" expand="block" style="flex: 1;">
            Search
          </ion-button>

          <ion-button fill="clear" routerLink="/search">
            Advanced Search
          </ion-button>
        </div>
      </form>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-item routerLink="/events">
      <ion-icon name="calendar" slot="start"></ion-icon>
      <ion-label>Events</ion-label>
    </ion-item>
    <ion-item routerLink="/news">
      <ion-icon name="megaphone" slot="start"></ion-icon>
      <ion-label>News</ion-label>
    </ion-item>
    <ion-item routerLink="/locations">
      <ion-icon name="compass" slot="start"></ion-icon>
      <ion-label>Locations & Hours</ion-label>
    </ion-item>
    <ion-item routerLink="/featured">
      <ion-icon name="star" slot="start"></ion-icon>
      <ion-label>Featured</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
