<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>TADL Mobile</ion-title>

    <ion-buttons slot="end">
      <ion-button aria-label="Open account menu" (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="welcome-card">
    <ion-card-content>
      <ng-container *ngIf="auth.authState() | async as s">
        <div *ngIf="s.isLoggedIn; else loggedOutWelcome" class="welcome-auth">
          <img
            [src]="isDarkMode() ? 'assets/logo-clock-only-dark.png' : 'assets/logo-clock-only.png'"
            alt="TADL logo"
            class="welcome-logo-auth"
          />
          <div class="welcome-copy">
            <div class="welcome-headline">Logged in as {{ loggedInUsername(s) }}</div>
            <div class="welcome-text">{{ holdsCheckoutsSummary(s.profile) }}</div>
          </div>
        </div>

        <ng-template #loggedOutWelcome>
          <div class="welcome-noauth">
            <img
              [src]="isDarkMode() ? 'assets/logo-dark.png' : 'assets/logo.png'"
              alt="Traverse Area District Library"
              class="welcome-logo-noauth"
            />
          </div>
        </ng-template>
      </ng-container>
    </ion-card-content>
  </ion-card>

  <ion-card class="search-card">
    <ion-card-content class="search-card-content">
      <form action="/search" method="get">
        <ion-searchbar
          class="home-searchbar"
          name="lookfor"
          placeholder="Search books, movies, music..."
          inputmode="search"
          enterkeyhint="search"
        ></ion-searchbar>

        <div class="home-search-actions">
          <ion-button type="submit" class="home-search-submit">
            Search
          </ion-button>

          <ion-button
            fill="clear"
            routerLink="/search"
            [queryParams]="{ advanced: 1 }"
            class="home-search-advanced"
          >
            Advanced Search
          </ion-button>
        </div>
      </form>
    </ion-card-content>
  </ion-card>

  <ng-container *ngIf="auth.authState() | async as s">
    <ng-container *ngIf="patron.badgesFromProfile(s.profile) as b">
      <ion-card *ngIf="s.isLoggedIn && showAccountShortcuts(s.profile)" class="home-section-card">
        <ion-card-header>
          <ion-card-title>Your Account</ion-card-title>
        </ion-card-header>
        <ion-list lines="full" class="home-account-list">
          <ion-item *ngIf="b.holds > 0" button routerLink="/holds">
            <ion-icon name="bookmark-outline" slot="start"></ion-icon>
            <ion-label>Holds</ion-label>
            <ion-badge slot="end">{{ b.holds }}</ion-badge>
          </ion-item>

          <ion-item *ngIf="b.checkouts > 0" button routerLink="/checkouts">
            <ion-icon name="albums-outline" slot="start"></ion-icon>
            <ion-label>Checkouts</ion-label>
            <ion-badge slot="end">{{ b.checkouts }}</ion-badge>
          </ion-item>

          <ion-item *ngIf="b.finesVal > 0" button routerLink="/fines">
            <ion-icon name="card-outline" slot="start"></ion-icon>
            <ion-label>Fines</ion-label>
            <ion-note slot="end">{{ b.finesText || ('$' + (b.finesVal | number:'1.2-2')) }}</ion-note>
          </ion-item>
        </ion-list>
      </ion-card>
    </ng-container>
  </ng-container>

  <ion-card class="home-section-card">
    <ion-card-header>
      <ion-card-title>Explore</ion-card-title>
    </ion-card-header>
    <ion-list lines="full" class="home-explore-list">
      <ion-item button routerLink="/events">
        <ion-icon name="calendar" slot="start"></ion-icon>
        <ion-label>Events</ion-label>
      </ion-item>

      <ion-item button routerLink="/news">
        <ion-icon name="megaphone" slot="start"></ion-icon>
        <ion-label>News</ion-label>
      </ion-item>

      <ion-item button routerLink="/locations">
        <ion-icon name="compass" slot="start"></ion-icon>
        <ion-label>Locations</ion-label>
      </ion-item>

      <ion-item button routerLink="/featured">
        <ion-icon name="star" slot="start"></ion-icon>
        <ion-label>Featured</ion-label>
      </ion-item>
    </ion-list>
  </ion-card>
</ion-content>
