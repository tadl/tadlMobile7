<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
    <ion-title>{{ location?.fullname || 'Location' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ng-container *ngIf="location">
    <div class="hero-wrap" *ngIf="location.image">
      <img class="hero" [src]="location.image" [alt]="location.fullname" />
    </div>

    <div class="content">
      <div class="details-card">
        <h2 class="title">{{ location.fullname }}</h2>

        <p class="today-pill" *ngIf="openTodayLine(location)">{{ openTodayLine(location) }}</p>

        <div class="contact">
          <div class="contact-top">
            <div class="contact-main">
              <div class="line" *ngIf="location.address">{{ location.address }}</div>
              <div class="line" *ngIf="location.citystatezip">{{ location.citystatezip }}</div>
            </div>

            <ion-button
              *ngIf="hasNavigationTarget(location)"
              size="small"
              class="navigate-button"
              (click)="openNavigation(location)"
            >
              <ion-icon name="navigate-outline" slot="start"></ion-icon>
              Navigate
            </ion-button>
          </div>

          <div class="contact-links" *ngIf="location.phone || location.email">
            <ion-button
              *ngIf="location.phone"
              size="small"
              fill="outline"
              class="contact-link-btn"
              [href]="telHref(location.phone)"
            >
              <ion-icon name="call-outline" slot="start"></ion-icon>
              {{ location.phone }}
            </ion-button>

            <ion-button
              *ngIf="location.email"
              size="small"
              fill="outline"
              class="contact-link-btn"
              [href]="mailtoHref(location.email)"
            >
              <ion-icon name="mail-outline" slot="start"></ion-icon>
              {{ location.email }}
            </ion-button>
          </div>
        </div>
      </div>

      <ion-card class="hours-card">
        <ion-card-header>
          <ion-card-title>Hours</ion-card-title>
          <div class="hours-subtitle">Weekly schedule</div>
        </ion-card-header>

        <ion-card-content>
          <div class="hours-grid">
            <div
              class="hours-row"
              *ngFor="let row of hoursRows(location)"
              [class.today]="row.isToday"
            >
              <div class="day">{{ row.day }}</div>
              <div class="hours">{{ row.hours }}</div>
            </div>
          </div>
        </ion-card-content>
      </ion-card>
    </div>
  </ng-container>
</ion-content>
