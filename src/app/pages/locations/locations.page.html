<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>Locations</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="get_locations(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item button *ngFor="let loc of locations" (click)="view_details(loc)">
      <ion-label>
        <h2>{{ loc.name }}</h2>
        <p *ngIf="loc.today_hours">{{ loc.today_hours }}</p>
      </ion-label>
      <ion-icon name="chevron-forward" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!globals.api_loading && locations.length === 0">
    <ion-label>No locations found.</ion-label>
  </ion-item>

  <ion-spinner *ngIf="globals.api_loading" class="ion-padding"></ion-spinner>
</ion-content>
