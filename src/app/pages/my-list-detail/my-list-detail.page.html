<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/my-lists"></ion-back-button>
    </ion-buttons>

    <ion-title>{{ listTitle }}</ion-title>

    <ion-buttons slot="end">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-card *ngIf="listDescription" class="list-description-card">
    <ion-card-content>
      <div class="list-description-text">{{ listDescription }}</div>
    </ion-card-content>
  </ion-card>

  <div class="list-owner-actions" *ngIf="canEditList">
    <ion-button
      fill="outline"
      size="small"
      class="owner-action-btn"
      [disabled]="mutatingList"
      (click)="editListMeta()"
    >
      Edit List
    </ion-button>
    <ion-button
      fill="outline"
      color="danger"
      size="small"
      class="owner-action-btn"
      [disabled]="mutatingList"
      (click)="confirmDeleteList()"
    >
      Delete List
    </ion-button>
  </div>

  <ion-list *ngIf="titles.length > 0" lines="full" class="full-list">
    <ion-item
      button
      detail="false"
      class="list-detail-row"
      *ngFor="let t of titles; trackBy: trackByTitle"
      (click)="openTitle(t)"
    >
      <ion-thumbnail slot="start" *ngIf="coverUrl(t)">
        <img [src]="coverUrl(t)" alt="" (error)="$event.target.style.display='none'" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <h2 class="result-title">
          <ion-icon [name]="mediaIconNameForTitle(t)" aria-hidden="true"></ion-icon>
          <span class="title">{{ titleText(t) }}</span>
        </h2>
        <div class="sub" *ngIf="authorText(t)">{{ authorText(t) }}</div>
      </ion-label>

      <ion-button
        slot="end"
        fill="clear"
        size="small"
        class="row-action"
        aria-label="List item actions"
        [disabled]="rowActionBusyFor(t)"
        (click)="openTitleActions(t, $event)"
      >
        <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-infinite-scroll
    [disabled]="infiniteDisabled"
    threshold="120px"
    (ionInfinite)="loadMore($event)"
  >
    <ion-infinite-scroll-content loadingText="Loading more..."></ion-infinite-scroll-content>
  </ion-infinite-scroll>

  <ion-item *ngIf="!loading && titles.length === 0">
    <ion-label class="ion-text-wrap">
      No titles in this list.
    </ion-label>
  </ion-item>
</ion-content>
