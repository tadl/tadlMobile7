<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>My Lists</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="createList()" [disabled]="loading || mutating">
        <ion-icon name="add" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-card class="manage-card">
    <ion-card-content>
      <ion-button expand="block" (click)="createList()" [disabled]="loading || mutating">
        Create New List
      </ion-button>

      <ion-item lines="none" class="manage-toggle">
        <ion-label>Manage Existing Lists</ion-label>
        <ion-toggle
          slot="end"
          [checked]="manageMode"
          [disabled]="mutating"
          (ionChange)="manageMode = $event.detail.checked"
        ></ion-toggle>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <ion-list *ngIf="lists.length > 0" lines="full" class="full-list">
    <ion-item button *ngFor="let list of lists; trackBy: trackByList" (click)="openList(list)">
      <ion-thumbnail slot="start" *ngIf="list.cover">
        <img [src]="list.cover" alt="" />
      </ion-thumbnail>

      <ion-label class="ion-text-wrap">
        <div class="title">{{ listTitle(list) }}</div>
        <div class="sub" *ngIf="listDescription(list)">{{ listDescription(list) }}</div>
        <ion-note>{{ list.public ? 'Public list' : 'Private list' }}</ion-note>
      </ion-label>

      <ion-badge slot="end" class="count-badge">{{ listCount(list) }}</ion-badge>

      <ng-container *ngIf="manageMode; else rowMenu">
        <ion-button
          slot="end"
          fill="clear"
          size="small"
          [disabled]="mutating"
          (click)="editList(list); $event.stopPropagation()"
        >
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-button>
        <ion-button
          slot="end"
          fill="clear"
          color="danger"
          size="small"
          [disabled]="mutating"
          (click)="confirmDeleteList(list); $event.stopPropagation()"
        >
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ng-container>

      <ng-template #rowMenu>
      <ion-button
        slot="end"
        fill="clear"
        size="small"
        class="row-action"
        [disabled]="mutating"
        (click)="openListActions(list, $event)"
      >
        <ion-icon name="ellipsis-vertical" slot="icon-only"></ion-icon>
      </ion-button>
      </ng-template>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!loading && lists.length === 0">
    <ion-label class="ion-text-wrap">
      You do not have any lists yet.
    </ion-label>
  </ion-item>
</ion-content>
