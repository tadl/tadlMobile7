<ion-header>
  <ion-toolbar>
    <ion-title>News</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <img
    *ngIf="heroImage()"
    [src]="heroImage()!"
    [alt]="titleFor()"
    class="hero"
  />

  <h2 [innerText]="titleFor()"></h2>
  <p class="muted" *ngIf="dateFor()">{{ dateFor() }}</p>

  <div *ngIf="htmlContent()" [innerHTML]="htmlContent()"></div>

  <ion-button expand="block" *ngIf="postUrl()" (click)="openLink(postUrl()!)">
    View on web
  </ion-button>
</ion-content>
