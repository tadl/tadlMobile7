<ion-header>
  <ion-toolbar>
    <ion-title>News</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card class="news-card">
    <img
      *ngIf="heroImage()"
      [src]="heroImage()!"
      [alt]="titleFor()"
      class="hero"
    />

    <ion-card-header>
      <ion-card-title class="title" [innerText]="titleFor()"></ion-card-title>
      <ion-card-subtitle class="meta" *ngIf="dateFor()">{{ dateFor() }}</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <div class="news-body prose" *ngIf="htmlContent()" [innerHTML]="htmlContent()"></div>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" *ngIf="postUrl()" (click)="openLink(postUrl()!)">
    View on web
  </ion-button>
</ion-content>
