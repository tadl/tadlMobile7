<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button menu="main"></ion-menu-button>
    </ion-buttons>

    <ion-title>News</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="globals.open_account_menu()">
        <ion-icon name="person-circle" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="get_news(); $event.target.complete()">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item button *ngFor="let n of news" (click)="view_details(n)">
      <ion-label>
        <h2>{{ n.title }}</h2>
        <p *ngIf="n.date">{{ n.date }}</p>
      </ion-label>
      <ion-icon name="chevron-forward" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!globals.api_loading && news.length === 0">
    <ion-label>No posts found.</ion-label>
  </ion-item>

  <ion-spinner *ngIf="globals.api_loading" class="ion-padding"></ion-spinner>
</ion-content>
