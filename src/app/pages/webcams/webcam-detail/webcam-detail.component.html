<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>

    <ion-title>{{ titleFor() }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="webcam-detail-shell">
    <ion-card class="player-card">
      <div class="player-frame" *ngIf="embedUrl() as safeUrl">
        <iframe
          [src]="safeUrl"
          [title]="titleFor()"
          allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </div>

      <ion-card-header>
        <ion-card-title>{{ titleFor() }}</ion-card-title>
        <ion-card-subtitle *ngIf="subtitleFor()">{{ subtitleFor() }}</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-button expand="block" fill="outline" *ngIf="webcam?.youtubeUrl" (click)="globals.open_page(webcam!.youtubeUrl)">
          Open on YouTube
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
